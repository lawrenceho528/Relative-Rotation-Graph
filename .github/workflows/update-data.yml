name: Update RRG data

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate RRG data
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python scripts/update_rrg_data.py --provider tiingo
      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update generated RRG data
          file_pattern: public/data/rrg.json
      - name: Prepare static artifact
        shell: pwsh
        run: ./scripts/prepare-dist.ps1
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
